<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Climate Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h3>Create Account</h3>
                <p>Join Climate Analytics Platform</p>
            </div>
            
            <div class="auth-body">
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert-custom alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}{{ message.tags }}{% endif %}">
                        <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% elif message.tags == 'success' %}check-circle{% else %}info-circle{% endif %} me-2"></i>
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}
                
                <form method="POST" action="{% url 'register' %}" id="registerForm">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>
                            <i class="fas fa-user"></i>
                            Username
                        </label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Choose a username" required>
                        <small class="text-muted" id="usernameError"></small>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <i class="fas fa-envelope"></i>
                            Email
                        </label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="input-icon-wrapper">
                            <input type="password" name="password" id="password" class="form-control" placeholder="Create a password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-bar-fill" id="strengthFill"></div>
                            </div>
                            <small id="strengthText" class="text-muted"></small>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <i class="fas fa-user-tag"></i>
                            Select Role
                        </label>
                        <div class="role-options">
                            <div class="role-card" onclick="selectRole('analyst')" id="role-analyst">
                                <i class="fas fa-chart-line role-icon"></i>
                                <div class="role-title">Analyst</div>
                                <div class="role-desc">Full access to analytics</div>
                                <input type="radio" name="role" value="analyst" checked>
                            </div>
                            <div class="role-card" onclick="selectRole('viewer')" id="role-viewer">
                                <i class="fas fa-eye role-icon"></i>
                                <div class="role-title">Viewer</div>
                                <div class="role-desc">Read-only access</div>
                                <input type="radio" name="role" value="viewer">
                            </div>
                            <div class="role-card" onclick="selectRole('admin')" id="role-admin">
                                <i class="fas fa-crown role-icon"></i>
                                <div class="role-title">Admin</div>
                                <div class="role-desc">Full system control</div>
                                <input type="radio" name="role" value="admin">
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-user-plus me-2"></i>
                        Create Account
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p class="mb-0">
                        Already have an account? 
                        <a href="{% url 'login' %}">
                            Sign In <i class="fas fa-arrow-right ms-1"></i>
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = event.target;
            
            if (field.type === "password") {
                field.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                field.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
        
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            const width = (strength / 5) * 100;
            strengthFill.style.width = width + '%';
            
            if (strength === 0) {
                strengthFill.style.background = '#e2e8f0';
                strengthText.textContent = 'Enter a password';
            } else if (strength <= 2) {
                strengthFill.style.background = '#ef4444';
                strengthText.textContent = 'Weak password';
            } else if (strength <= 3) {
                strengthFill.style.background = '#f59e0b';
                strengthText.textContent = 'Medium password';
            } else if (strength <= 4) {
                strengthFill.style.background = '#3b82f6';
                strengthText.textContent = 'Strong password';
            } else {
                strengthFill.style.background = '#10b981';
                strengthText.textContent = 'Very strong password';
            }
        });
        
        // Role selection
        function selectRole(role) {
            // Remove selected class from all
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Add selected class to clicked card
            document.getElementById(`role-${role}`).classList.add('selected');
            
            // Check the radio button
            document.querySelector(`input[name="role"][value="${role}"]`).checked = true;
        }
        
        // Username validation
        const usernameInput = document.getElementById('username');
        const usernameError = document.getElementById('usernameError');
        
        usernameInput.addEventListener('input', function() {
            const username = this.value;
            if (username.length < 3 && username.length > 0) {
                usernameError.textContent = 'Username must be at least 3 characters';
                usernameError.style.color = '#ef4444';
            } else if (username.length > 20) {
                usernameError.textContent = 'Username must be less than 20 characters';
                usernameError.style.color = '#ef4444';
            } else {
                usernameError.textContent = '';
            }
        });
            
        // Form validation
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            if (password.length < 6) {
                e.preventDefault();
                alert('Password must be at least 6 characters long');
                return false;
            }
        });
    </script>
</body>
</html>
